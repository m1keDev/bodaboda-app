# ── Listener 1: Standard MQTT (used by Flask backend and driver simulator)
listener 1883
protocol mqtt

# ── Listener 2: WebSocket (used by the browser frontend)
listener 9001
protocol websockets

# ── Allow connections without username/password
# This is fine for local development and assignment demonstration
allow_anonymous true

# ── Logging — logs connection events and messages to console
log_type all