version: '3.8'

services:

  # ── 1. Flask web app ───────────────────────────────────
  bodaconnect-app:
    build: .
    container_name: bodaconnect-app
    ports:
      - "5000:5000"
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - mosquitto

  # ── 2. MQTT Broker ─────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - monitoring
    restart: unless-stopped

  # ── 3. Driver Simulator ────────────────────────────────
  driver-simulator:
    build: ./simulator
    container_name: driver-simulator
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - mosquitto
    # No ports needed — this container only talks MQTT internally

  # ── 4. Node Exporter ───────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring
    restart: unless-stopped

  # ── 5. Prometheus ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - bodaconnect-app
      - node-exporter

  # ── 6. Grafana ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: