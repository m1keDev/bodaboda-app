global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Scrape the Flask app
  - job_name: 'bodaconnect-app'
    static_configs:
      - targets: ['bodaconnect-app:5000']

  # Scrape Node Exporter (system metrics: CPU, RAM, disk)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']