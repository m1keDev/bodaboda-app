name: BodaConnect CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: TEST ─────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Allow anonymous connections on the CI Mosquitto instance
      - name: Configure Mosquitto for CI
        run: |
          docker exec $(docker ps -q --filter ancestor=eclipse-mosquitto:2.0) \
            sh -c "printf 'listener 1883\nallow_anonymous true\n' > /mosquitto/config/mosquitto.conf"
          docker exec $(docker ps -q --filter ancestor=eclipse-mosquitto:2.0) \
            kill -HUP 1 || true
          sleep 2

      # TESTING=true prevents app.py from starting its MQTT background thread
      # MQTT_BROKER=localhost points the MQTT test at the CI service container
      - name: Run tests
        run: pytest tests/ -v
        env:
          TESTING: "true"
          MQTT_BROKER: localhost

  # ── JOB 2: BUILD & PUSH ──────────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1

      - name: Build and push simulator image
        uses: docker/build-push-action@v4
        with:
          context: ./simulator
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:v1

      - name: Confirm pushed images
        run: |
          echo "Images pushed:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:v1"

  # ── JOB 3: DEPLOY TO STAGING ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start MQTT broker for staging
        run: |
          docker network create staging-net || true
          docker run -d \
            --name mosquitto-staging \
            --network staging-net \
            -p 1883:1883 \
            eclipse-mosquitto:2.0 \
            sh -c "printf 'listener 1883\nallow_anonymous true\n' > /mosquitto/config/mosquitto.conf && /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
          sleep 3

      - name: Deploy app to staging
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest
          docker stop bodaconnect-staging 2>/dev/null || true
          docker rm bodaconnect-staging 2>/dev/null || true
          docker run -d \
            --name bodaconnect-staging \
            --network staging-net \
            -p 5001:5000 \
            -e MQTT_BROKER=mosquitto-staging \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest

      - name: Deploy simulator to staging
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest
          docker stop driver-sim-staging 2>/dev/null || true
          docker rm driver-sim-staging 2>/dev/null || true
          docker run -d \
            --name driver-sim-staging \
            --network staging-net \
            -e MQTT_BROKER=mosquitto-staging \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest

      - name: Wait for staging to start
        run: sleep 5

      - name: Verify staging is running
        run: curl -f http://localhost:5001 && echo "Staging is UP"

      - name: Show staging containers
        run: docker ps | grep staging

  # ── JOB 4: DEPLOY TO PRODUCTION ──────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start MQTT broker for production
        run: |
          docker network create prod-net || true
          docker run -d \
            --name mosquitto-prod \
            --network prod-net \
            -p 1884:1883 \
            eclipse-mosquitto:2.0 \
            sh -c "printf 'listener 1883\nallow_anonymous true\n' > /mosquitto/config/mosquitto.conf && /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
          sleep 3

      - name: Deploy app to production
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest
          docker stop bodaconnect-production 2>/dev/null || true
          docker rm bodaconnect-production 2>/dev/null || true
          docker run -d \
            --name bodaconnect-production \
            --network prod-net \
            -p 5002:5000 \
            -e MQTT_BROKER=mosquitto-prod \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest

      - name: Deploy simulator to production
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest
          docker stop driver-sim-prod 2>/dev/null || true
          docker rm driver-sim-prod 2>/dev/null || true
          docker run -d \
            --name driver-sim-prod \
            --network prod-net \
            -e MQTT_BROKER=mosquitto-prod \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest

      - name: Wait for production to start
        run: sleep 5

      - name: Verify production is running
        run: curl -f http://localhost:5002 && echo "Production is UP"

      - name: Show production containers
        run: docker ps | grep prod

      - name: Deployment complete
        run: |
          echo "BodaConnect + MQTT deployed to production"
          echo "App:       ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest"
          echo "Simulator: ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest"