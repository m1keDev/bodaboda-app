name: BodaConnect CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: TEST ─────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Mosquitto broker
        run: |
          docker run -d \
            --name mosquitto-ci \
            -p 1883:1883 \
            -v ${{ github.workspace }}/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf \
            eclipse-mosquitto:2.0
          sleep 5
          docker logs mosquitto-ci

      - name: Run tests
        run: pytest tests/ -v
        env:
          TESTING: "true"
          MQTT_BROKER: localhost

  # ── JOB 2: BUILD & PUSH TO DOCKER HUB ───────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Dynamic version tag using the pipeline run number
      # Run 1 → v1.1, Run 2 → v1.2, etc.
      - name: Build and push app image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1.${{ github.run_number }}

      - name: Build and push simulator image
        uses: docker/build-push-action@v4
        with:
          context: ./simulator
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:v1.${{ github.run_number }}

      - name: Confirm pushed images
        run: |
          echo "Images pushed to Docker Hub:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1.${{ github.run_number }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:v1.${{ github.run_number }}"

  # ── JOB 3: DEPLOY TO STAGING ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start MQTT broker for staging
        run: |
          docker network create staging-net || true
          docker run -d \
            --name mosquitto-staging \
            --network staging-net \
            -p 1883:1883 \
            eclipse-mosquitto:2.0 \
            sh -c "printf 'listener 1883\nallow_anonymous true\n' > /mosquitto/config/mosquitto.conf && /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
          sleep 3

      - name: Deploy app to staging
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest
          docker stop bodaconnect-staging 2>/dev/null || true
          docker rm bodaconnect-staging 2>/dev/null || true
          docker run -d \
            --name bodaconnect-staging \
            --network staging-net \
            -p 5001:5000 \
            -e MQTT_BROKER=mosquitto-staging \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest

      - name: Deploy simulator to staging
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest
          docker stop driver-sim-staging 2>/dev/null || true
          docker rm driver-sim-staging 2>/dev/null || true
          docker run -d \
            --name driver-sim-staging \
            --network staging-net \
            -e MQTT_BROKER=mosquitto-staging \
            ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect-simulator:latest

      - name: Wait for staging to start
        run: sleep 5

      - name: Verify staging is running
        run: curl -f http://localhost:5001 && echo "Staging is UP"

      - name: Show staging containers
        run: docker ps | grep staging

  # ── JOB 4: DEPLOY TO PRODUCTION (RENDER) ─────────────────────────────
  deploy-production:
    name: Deploy to Production on Render
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      # Trigger Render to pull the latest image from Docker Hub and redeploy
      # Render's deploy hook restarts the service with the newest :latest tag
      - name: Trigger Render deployment
        run: |
          curl -s --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --data '{"clearCache": false}' \
            | tee render_response.json

      # Wait for Render to finish deploying
      - name: Wait for Render deployment to complete
        run: |
          echo "Waiting for Render to deploy..."
          sleep 30

      # Verify the live Render URL is responding
      - name: Verify production is live
        run: |
          curl -f ${{ secrets.RENDER_URL }} || \
          echo "Note: Render free tier may take up to 60s to wake up on first request"

      - name: Deployment complete
        run: |
          echo "BodaConnect deployed to production on Render"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1.${{ github.run_number }}"
          echo "Version tag: v1.${{ github.run_number }}"